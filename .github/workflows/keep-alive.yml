name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        run: |
          URL="https://prayer-times-d4w8.onrender.com/health"
          for i in 1 2 3; do
            if curl -fsSL --max-time 60 "$URL" -o /tmp/resp.json; then
              echo "OK on attempt $i:"
              cat /tmp/resp.json
              exit 0
            fi
            sleep $((i*10))
          done
          exit 1
